const STEPS = [
  { num: 1, title: "Konflikt analysieren", subtitle: "Wo genau liegt das ethische Problem?", icon: "\u{1F50D}", prompt: "Beschreiben Sie das ethische Problem in Ihren eigenen Worten. Versuchen Sie, es auf den Kern zu beschränken - wo genau liegt der Konflikt? Welche Interessen stehen gegeneinander?", inputType: "textarea" },
  { num: 2, title: "Fakten prüfen", subtitle: "Was wissen wir wirklich?", icon: "\u{1F4CA}", prompt: "Welche Fakten und Daten sind relevant? Welche Fragen müssten Sie recherchieren? Suchen Sie nicht nur nach Bestätigung Ihrer Meinung, sondern betrachten Sie auch Gegenargumente.", inputType: "textarea" },
  { num: 3, title: "Faktoren identifizieren", subtitle: "Was beeinflusst das Problem?", icon: "\u{1F9E9}", prompt: "Listen Sie alle relevanten Faktoren auf - sowohl interne (persönliche Werte, Vorurteile) als auch externe (gesellschaftliche Strukturen, technische Einschränkungen, wirtschaftliche Interessen).", inputType: "textarea" },

  { num: 6, title: "Entscheidung treffen", subtitle: "Welche Option wählen Sie - und warum?", icon: "\u2705", prompt: "Basierend auf Ihrer Analyse in den Schritten 1-5: Für welche Option entscheiden Sie sich? Begründen Sie Ihre Wahl.", inputType: "decision" },

const ETHICS_TESTS = [
  { id: "harm", name: "Schadens-Test", question: "Ist diese Option weniger schädlich als die anderen?" },
  { id: "privacy", name: "Datenschutz-Test", question: "Greife ich mit dieser Option in die Privatsphäre anderer ein?" },
  { id: "publicity", name: "Öffentlichkeits-Test", question: "Würde ich wollen, dass diese Entscheidung in der Zeitung steht?" },
  { id: "defense", name: "Verteidigungstest", question: "Könnte ich diese Entscheidung vor einer Gruppe verteidigen?" },
  { id: "reversibility", name: "Reversibilitätstest", question: "Wäre ich einverstanden, wenn ich selbst davon betroffen wäre?" },
  { id: "colleague", name: "Kollegen-Test", question: "Was würden Kollegen sagen, wenn ich diese Option vorschlage?" }
];

/* ───────── FEEDBACK ENGINE ───────── */

function generateStepFeedback(stepNum, data, allAnswers) {
  var fb = [];

  if (stepNum === 1) {
    var text = (data || "").trim();
    if (!text) return [];
    var len = text.length;
    var hasQuestion = text.includes("?");
    var mentionsStakeholders = /wer|nutzer|betroffen|mensch|gruppe|person|opfer|täter|entwickl|unternehm|gesellschaft|patient|bewerb|frau|männ/i.test(text);
    var mentionsConflict = /konflikt|widerspruch|spannung|dilemma|einerseits|andererseits|zwar.*aber|vs\.|gegenüber|interesse|profit|schaden|nutzen/i.test(text);
    var mentionsCausality = /weil|ursache|grund|denn|dadurch|führt zu|bewirkt|folge|konsequenz|verantwort/i.test(text);

    if (len < 60) fb.push({ type: "nudge", icon: "\u{1F4CF}", text: "Ihre Analyse ist recht knapp. Versuchen Sie, den Konflikt konkreter herauszuarbeiten - welche Interessen stehen gegeneinander?" });
    if (mentionsConflict) fb.push({ type: "good", icon: "\u2713", text: "Gut: Sie haben einen Interessenkonflikt oder eine Spannung herausgearbeitet." });
    if (mentionsStakeholders) fb.push({ type: "good", icon: "\u2713", text: "Gut: Sie benennen konkrete Beteiligte oder Betroffene." });
    else fb.push({ type: "nudge", icon: "\u{1F465}", text: "Wer genau ist hier betroffen? Benennen Sie die Akteure und Betroffenen - das schärft die Analyse." });
    if (mentionsCausality) fb.push({ type: "good", icon: "\u2713", text: "Gut: Sie denken über Ursachen und Zusammenhänge nach." });
    if (hasQuestion) fb.push({ type: "good", icon: "\u2713", text: "Gut: Sie stellen weiterführende Fragen - das zeigt differenziertes Denken." });
  }

  if (stepNum === 2) {
    var text = (data || "").trim();
    if (!text) return [];
    var len = text.length;
    var step1 = (allAnswers[1] || "").trim();
    var hasCounterpoint = /allerdings|jedoch|andererseits|dagegen|kritik|widerspr|gegenargument|aber auch|einschränk/i.test(text);
    var hasNumbers = /\d+\s*(%|prozent|studie|statistik|million|mrd|milliard|zahl|daten|erhebung|umfrage)/i.test(text);
    var hasSource = /studie|forschung|quelle|bericht|untersuchung|laut|zufolge|bericht|paper|publikation/i.test(text);

    // Prozess-Feedback: Verhältnis Fakten vs. Problem
    if (step1 && len < step1.length * 0.4 && len < 120) {
      fb.push({ type: "mirror", icon: "\u{1F50D}", text: "Beobachtung: Sie haben zum Problem deutlich mehr geschrieben als zu den Fakten. Manchmal bildet sich eine Meinung, bevor die Fakten vollständig geprüft sind - das ist menschlich, aber es lohnt sich, hier nochmal tiefer zu graben." });
    }
    if (!hasCounterpoint) fb.push({ type: "nudge", icon: "\u2696\uFE0F", text: "Haben Sie auch nach Gegenargumenten oder widersprechenden Fakten gesucht? Eine einseitige Faktensammlung kann Confirmation Bias verstärken." });
    else fb.push({ type: "good", icon: "\u2713", text: "Gut: Sie berücksichtigen verschiedene Perspektiven und Gegenargumente." });
    if (hasNumbers || hasSource) fb.push({ type: "good", icon: "\u2713", text: "Gut: Sie beziehen sich auf Daten oder Quellen - das stärkt Ihre Analyse." });
    if (!hasNumbers && !hasSource && len > 30) fb.push({ type: "nudge", icon: "\u{1F4CA}", text: "Tipp: Schauen Sie in die Quellen-Links oben im Szenario-Bereich - dort finden Sie Studien und Daten zu diesem Fall." });
  }

  if (stepNum === 3) {
    var text = (data || "").trim();
    if (!text) return [];
    var hasInternal = /persönlich|eigen|wert|moral|vorurteil|glaub|überzeug|bias|einstellung|gewohn|intern/i.test(text);
    var hasExternal = /gesellschaft|struktur|gesetz|regulier|wirtschaft|politik|markt|kultur|system|extern|institution|macht/i.test(text);

    if (hasInternal && hasExternal) fb.push({ type: "good", icon: "\u2713", text: "Sehr gut: Sie berücksichtigen sowohl interne als auch externe Faktoren. Das ist entscheidend für eine vollständige Analyse." });
    else if (hasInternal && !hasExternal) fb.push({ type: "nudge", icon: "\u{1F310}", text: "Sie fokussieren stark auf persönliche/interne Faktoren. Gibt es auch äußere Strukturen (Gesetze, Märkte, Machtverhältnisse), die das Problem beeinflussen?" });
    else if (!hasInternal && hasExternal) fb.push({ type: "nudge", icon: "\u{1F9D1}", text: "Sie fokussieren stark auf externe/strukturelle Faktoren. Gibt es auch persönliche Werte, Vorurteile oder Gewohnheiten, die eine Rolle spielen?" });
    else if (text.length > 20) fb.push({ type: "nudge", icon: "\u{1F9E9}", text: "Versuchen Sie, Ihre Faktoren in 'interne' (eigene Werte, Vorurteile) und 'externe' (Strukturen, Gesetze, Märkte) aufzuteilen." });
  }

  if (stepNum === 4) {
    var opts = (data || []).filter(function(o) { return o.trim(); });
    if (opts.length === 0) return [];
    if (opts.length < 2) fb.push({ type: "nudge", icon: "\u{1F4A1}", text: "Nur eine Option? Bei ethischen Fragen gibt es fast nie nur einen Weg. Versuchen Sie, mindestens eine Alternative zu formulieren - auch wenn sie unbequem ist." });
    if (opts.length >= 3) fb.push({ type: "good", icon: "\u2713", text: "Gut: Sie haben " + opts.length + " Optionen entwickelt. Mehr Optionen eröffnen größere Handlungsspielräume." });

    // Prüfen ob Optionen sich substantiell unterscheiden
    if (opts.length >= 2) {
      var allShort = opts.every(function(o) { return o.length < 40; });
      if (allShort) fb.push({ type: "nudge", icon: "\u{1F4DD}", text: "Ihre Optionen sind recht knapp formuliert. Detailliertere Beschreibungen helfen später beim Testen der Optionen." });
    }
  }

  if (stepNum === 5) {
    var matrix = data || {};
    var keys = Object.keys(matrix);
    var opts = (allAnswers[4] || []).filter(function(o) { return o.trim(); });
    var totalCells = opts.length * ETHICS_TESTS.length;

    if (keys.length === 0) return [];

    var filledCells = keys.filter(function(k) { return matrix[k] > 0; }).length;
    var completeness = totalCells > 0 ? filledCells / totalCells : 0;

    if (completeness < 0.5) fb.push({ type: "nudge", icon: "\u{1F4CB}", text: "Sie haben erst " + Math.round(completeness * 100) + "% der Ethik-Tests ausgefüllt. Die Tests, die Sie auslassen, könnten genau die blinden Flecken aufzeigen." });
    else if (completeness >= 0.8) fb.push({ type: "good", icon: "\u2713", text: "Gründlich: Sie haben " + Math.round(completeness * 100) + "% der Tests ausgefüllt." });

    // Check for "unclear" dominance
    var unclearCount = keys.filter(function(k) { return matrix[k] === 3; }).length;
    if (unclearCount > filledCells * 0.5 && filledCells > 3) fb.push({ type: "mirror", icon: "\u{1F914}", text: "Beobachtung: Sie haben viele Tests mit '?' (unklar) bewertet. Das kann auf echte Komplexität hindeuten - oder darauf, dass die Optionen noch nicht konkret genug definiert sind." });

    // Check if one option clearly dominates
    if (opts.length >= 2) {
      var scores = opts.map(function(_, oi) {
        var s = 0;
        ETHICS_TESTS.forEach(function(test) {
          var v = matrix[test.id + "-" + oi] || 0;
          if (v === 1) s += 1;
          if (v === 2) s -= 1;
        });
        return s;
      });
      var maxScore = Math.max.apply(null, scores);
      var minScore = Math.min.apply(null, scores);
      if (maxScore - minScore >= 4 && filledCells >= totalCells * 0.6) {
        var bestIdx = scores.indexOf(maxScore);
        fb.push({ type: "insight", icon: "\u{1F4C8}", text: "Nach Ihren Tests schneidet Option " + String.fromCharCode(65 + bestIdx) + " deutlich besser ab als die anderen. In Schritt 6 wird interessant zu sehen sein, ob Sie sich auch dafür entscheiden." });
      }
    }
  }

  if (stepNum === 6) {
    if (!data || data.chosen === undefined) return [];
    var matrix = allAnswers[5] || {};
    var opts = (allAnswers[4] || []).filter(function(o) { return o.trim(); });
    var chosenIdx = data.chosen;
    var reason = (data.reason || "").trim();

    // KONSISTENZ-CHECK: Matrix vs. Entscheidung
    if (Object.keys(matrix).length > 0 && opts.length >= 2) {
      var scores = opts.map(function(_, oi) {
        var s = 0;
        ETHICS_TESTS.forEach(function(test) {
          var v = matrix[test.id + "-" + oi] || 0;
          if (v === 1) s += 1;
          if (v === 2) s -= 1;
        });
        return s;
      });
      var maxScore = Math.max.apply(null, scores);
      var bestByTest = scores.indexOf(maxScore);
      var chosenScore = scores[chosenIdx] || 0;

      if (bestByTest !== chosenIdx && maxScore - chosenScore >= 2) {
        fb.push({ type: "mirror", icon: "\u{1F500}", text: "Interessante Beobachtung: In Ihren Ethik-Tests (Schritt 5) schnitt Option " + String.fromCharCode(65 + bestByTest) + " am besten ab, aber Sie wählen Option " + String.fromCharCode(65 + chosenIdx) + ". Das ist nicht falsch - aber es lohnt sich, diesen Unterschied bewusst zu reflektieren. Gibt es Gründe, die über die Tests hinausgehen?" });
      } else if (bestByTest === chosenIdx && maxScore > minScore) {
        fb.push({ type: "good", icon: "\u2713", text: "Ihre Entscheidung ist konsistent mit Ihren Ethik-Tests - Option " + String.fromCharCode(65 + chosenIdx) + " schnitt auch dort am besten ab." });
      }

      // Prüfe ob gewählte Option bei bestimmten Tests durchfiel
      var failedTests = [];
      ETHICS_TESTS.forEach(function(test) {
        var v = matrix[test.id + "-" + chosenIdx];
        if (v === 2) failedTests.push(test.name);
      });
      if (failedTests.length > 0) {
        fb.push({ type: "mirror", icon: "\u26A0\uFE0F", text: "Ihre gewählte Option hat bei folgenden Tests nicht bestanden: " + failedTests.join(", ") + ". Wie gehen Sie mit diesen Schwächen um?" });
      }
    }

    if (reason.length < 40 && reason.length > 0) fb.push({ type: "nudge", icon: "\u{1F4DD}", text: "Ihre Begründung ist recht kurz. Eine ausführlichere Begründung hilft, die eigene Entscheidung später nachvollziehen zu können." });
  }

  if (stepNum === 7) {
    var d = data || {};
    var filled = [d.q0, d.q1, d.q2].filter(function(v) { return v && v.trim().length > 10; }).length;
    if (filled === 3) fb.push({ type: "good", icon: "\u{1F3AF}", text: "Sie haben alle drei Reflexionsfragen durchdacht - das zeigt echte Auseinandersetzung mit dem Thema." });
    if (filled > 0 && filled < 3) fb.push({ type: "nudge", icon: "\u{1F504}", text: "Sie haben " + filled + " von 3 Reflexionsfragen beantwortet. Die fehlenden könnten wertvolle Einsichten liefern." });

    var mentionsOthers = /team|kolleg|expert|ander|gemeinsam|zusammen|einbezieh|perspektiv|divers/i.test((d.q2 || ""));
    if (mentionsOthers) fb.push({ type: "good", icon: "\u{1F91D}", text: "Gut: Sie denken daran, andere Perspektiven einzubeziehen. Ethische Entscheidungen profitieren fast immer von Vielfalt." });
  }

  return fb;
}

function generateSummaryAnalysis(answers) {
  var insights = [];

  /* 1 - Tiefe und Aufwand pro Schritt */
  var lengths = {};
  for (var i = 1; i <= 7; i++) {
    var d = answers[i];
    if (!d) { lengths[i] = 0; continue; }
    if (typeof d === "string") lengths[i] = d.trim().length;
    else if (Array.isArray(d)) lengths[i] = d.filter(function(x){return x.trim();}).reduce(function(a,b){return a + b.length;}, 0);
    else if (i === 5) lengths[i] = Object.keys(d).filter(function(k){return d[k]>0;}).length * 20;
    else if (i === 6) lengths[i] = ((d.reason||"").length) + (d.chosen !== undefined ? 30 : 0);
    else if (i === 7) lengths[i] = [d.q0,d.q1,d.q2].filter(Boolean).reduce(function(a,b){return a+b.length;},0);
    else lengths[i] = 0;
  }

  var maxLen = Math.max.apply(null, Object.values(lengths).concat([1]));
  var deepest = Object.keys(lengths).reduce(function(a,b){ return lengths[a] > lengths[b] ? a : b; });
  var shallowest = Object.keys(lengths).filter(function(k){return lengths[k]>0;}).reduce(function(a,b){ return lengths[a] < lengths[b] ? a : b; }, "1");
  var emptySteps = Object.keys(lengths).filter(function(k){return lengths[k]===0;});

  if (deepest && shallowest && deepest !== shallowest) {
    var deepStep = STEPS[parseInt(deepest) - 1];
    var shallowStep = STEPS[parseInt(shallowest) - 1];
    insights.push({
      type: "balance",
      icon: "\u{1F4CA}",
      title: "Aufwandsverteilung",
      text: "Sie haben am meisten bei '" + deepStep.title + "' geschrieben und am wenigsten bei '" + shallowStep.title + "'. Das kann bewusst sein - oder ein Hinweis darauf, wo Sie sich weniger sicher fühlen."
    });
  }

  if (emptySteps.length > 0 && emptySteps.length < 7) {
    var names = emptySteps.map(function(k){return STEPS[parseInt(k)-1].title;});
    insights.push({
      type: "completeness",
      icon: "\u{1F4CB}",
      title: "Vollständigkeit",
      text: emptySteps.length === 1
        ? "Sie haben den Schritt '" + names[0] + "' übersprungen. Dieser Schritt könnte Ihre Analyse bereichern."
        : "Sie haben " + emptySteps.length + " Schritte übersprungen: " + names.join(", ") + ". Je mehr Schritte Sie durchlaufen, desto robuster wird Ihre Entscheidung."
    });
  }

  /* 2 - Fakten vs. Meinung Balance */
  var step1Len = lengths[1] || 0;
  var step2Len = lengths[2] || 0;
  if (step1Len > 0 && step2Len > 0) {
    var ratio = step2Len / step1Len;
    if (ratio < 0.3) {
      insights.push({
        type: "bias-risk",
        icon: "\u{1F50D}",
        title: "Meinung vs. Fakten",
        text: "Sie haben zum Problem etwa " + Math.round(step1Len / step2Len) + "x so viel geschrieben wie zu den Fakten. Dies kann ein Zeichen dafür sein, dass die Meinung vor der Faktenprüfung stand - ein klassischer Confirmation Bias. Das ist keine Kritik, sondern ein menschliches Muster, das es wert ist, bewusst zu reflektieren."
      });
    } else if (ratio > 1.5) {
      insights.push({
        type: "good-pattern",
        icon: "\u2713",
        title: "Faktenbasiert",
        text: "Ihre Faktenanalyse ist ausführlicher als Ihre Problemdefinition - das deutet auf einen sorgfältigen, datengestützten Denkprozess hin."
      });
    }
  }

  /* 3 - Matrix-Konsistenz mit Entscheidung */
  var matrix = answers[5] || {};
  var decision = answers[6] || {};
  var opts = (answers[4] || []).filter(function(o){return o.trim();});
  if (Object.keys(matrix).length > 0 && decision.chosen !== undefined && opts.length >= 2) {
    var scores = opts.map(function(_, oi) {
      var s = 0;
      ETHICS_TESTS.forEach(function(test) {
        var v = matrix[test.id + "-" + oi] || 0;
        if (v === 1) s += 1;
        if (v === 2) s -= 1;
      });
      return s;
    });
    var bestByTest = scores.indexOf(Math.max.apply(null, scores));
    if (bestByTest !== decision.chosen) {
      insights.push({
        type: "consistency",
        icon: "\u{1F500}",
        title: "Kopf vs. Bauch",
        text: "In Ihren Ethik-Tests schnitt Option " + String.fromCharCode(65 + bestByTest) + " am besten ab, gewählt haben Sie aber Option " + String.fromCharCode(65 + decision.chosen) + ". Dieser Unterschied zwischen analytischem Ergebnis und persönlicher Entscheidung ist aufschlussreich. Er kann darauf hindeuten, dass es Werte gibt, die in den Tests nicht abgebildet sind - oder dass unbewusste Präferenzen eine Rolle spielen."
      });
    } else {
      insights.push({
        type: "good-pattern",
        icon: "\u{1F3AF}",
        title: "Konsistente Entscheidung",
        text: "Ihre Entscheidung stimmt mit dem Ergebnis Ihrer Ethik-Tests überein. Analyse und Intuition weisen in die gleiche Richtung - das ist ein gutes Zeichen."
      });
    }
  }

  /* 4 - Perspektiven-Check */
  var allText = "";
  for (var i = 1; i <= 7; i++) {
    var d = answers[i];
    if (typeof d === "string") allText += " " + d;
    else if (Array.isArray(d)) allText += " " + d.join(" ");
    else if (d && typeof d === "object") {
      if (d.reason) allText += " " + d.reason;
      if (d.q0) allText += " " + d.q0;
      if (d.q1) allText += " " + d.q1;
      if (d.q2) allText += " " + d.q2;
    }
  }
  allText = allText.toLowerCase();
  var hasTechPerspective = /algorithmus|daten|code|training|modell|software|system|techni/i.test(allText);
  var hasSocialPerspective = /gesellschaft|sozial|mensch|betroffen|ungleich|gerecht|diskriminier|benachteilig/i.test(allText);
  var hasLegalPerspective = /gesetz|regulier|recht|vorschrift|verordnung|dsgvo|compliance|pflicht/i.test(allText);
  var hasEconomicPerspective = /wirtschaft|kosten|gewinn|markt|unternehm|profit|business|geschäft/i.test(allText);
  var perspectives = [];
  if (hasTechPerspective) perspectives.push("technisch");
  if (hasSocialPerspective) perspectives.push("sozial/gesellschaftlich");
  if (hasLegalPerspective) perspectives.push("rechtlich");
  if (hasEconomicPerspective) perspectives.push("wirtschaftlich");

  var missing = [];
  if (!hasTechPerspective) missing.push("technische");
  if (!hasSocialPerspective) missing.push("soziale/gesellschaftliche");
  if (!hasLegalPerspective) missing.push("rechtliche");
  if (!hasEconomicPerspective) missing.push("wirtschaftliche");

  if (perspectives.length > 0 && missing.length > 0 && missing.length <= 3) {
    insights.push({
      type: "perspective",
      icon: "\u{1F441}\uFE0F",
      title: "Blickwinkel-Analyse",
      text: "Ihre Analyse deckt " + perspectives.join(", ") + " Perspektiven ab. Weniger präsent waren " + missing.join(" und ") + " Aspekte. Ethische Entscheidungen profitieren von möglichst vielen Blickwinkeln."
    });
  } else if (perspectives.length >= 3) {
    insights.push({
      type: "good-pattern",
      icon: "\u{1F441}\uFE0F",
      title: "Vielfältige Perspektiven",
      text: "Sie betrachten das Problem aus mehreren Blickwinkeln: " + perspectives.join(", ") + ". Diese Vielfalt stärkt Ihre ethische Analyse."
    });
  }

  return insights;
}

  // Use scenario-specific prompt if available, otherwise fall back to generic
  var promptKey = "step" + step.num;
  var prompt = (scenarioObj && scenarioObj.prompts && scenarioObj.prompts[promptKey]) ? scenarioObj.prompts[promptKey] : step.prompt;
  var textareaStyle = { width: "100%", padding: 16, borderRadius: 12, border: "2px solid #e5e7eb", fontSize: 14, fontFamily: "'DM Sans', sans-serif", lineHeight: 1.7, resize: "vertical", background: "#fafbfc", boxSizing: "border-box", color: "#1f2937" };

          onFocus={function(e){e.target.style.borderColor="#2a6a5a";}} onBlur={function(e){e.target.style.borderColor="#e5e7eb";}} />

      <div>
        <p style={{ fontSize: 14, lineHeight: 1.8, color: "#4b5563", fontFamily: "'DM Sans', sans-serif", marginBottom: 16 }}>{prompt}</p>
        {opts.map(function(opt, i) {

              <textarea value={opt} onChange={function(e) { var newOpts = opts.slice(); newOpts[i] = e.target.value; setData(newOpts); }}
                placeholder={"Option " + String.fromCharCode(65 + i) + " beschreiben..."} rows={2}
                style={Object.assign({}, textareaStyle, { flex: 1, padding: 12, borderRadius: 10, resize: "none" })}
                onFocus={function(e){e.target.style.borderColor="#2a6a5a";}} onBlur={function(e){e.target.style.borderColor="#e5e7eb";}} />
            </div>
          );
        })}
        <button onClick={function(){setData(opts.concat([""]));}} style={{ background: "none", border: "1px dashed #c5cdd5", borderRadius: 10, padding: "10px 16px", cursor: "pointer", fontSize: 13, color: "#6b7280", fontFamily: "'DM Sans', sans-serif", transition: "all 0.2s ease", width: "100%" }}
          onMouseEnter={function(e){e.target.style.borderColor="#2a6a5a";e.target.style.color="#2a6a5a";}} onMouseLeave={function(e){e.target.style.borderColor="#c5cdd5";e.target.style.color="#6b7280";}}>+ Weitere Option hinzufügen</button>
        {hint && <HintBox text={hint} />}
      </div>
    );
  }
  if (step.inputType === "matrix") {
    var filledOptions = (options || []).filter(function(o){return o.trim();});
    var matrix = data || {};
    if (filledOptions.length === 0) {
      return (<div style={{ padding: 24, background: "#fef3c7", borderRadius: 12, fontSize: 14, color: "#92400e", fontFamily: "'DM Sans', sans-serif", lineHeight: 1.7 }}>{"\u26A0\uFE0F"} Sie haben in Schritt 4 noch keine Optionen eingetragen. Bitte gehen Sie zurück und definieren Sie mindestens eine Handlungsoption.</div>);

    return (
      <div>
        <p style={{ fontSize: 14, lineHeight: 1.8, color: "#4b5563", fontFamily: "'DM Sans', sans-serif", marginBottom: 20 }}>{prompt}</p>

          {filledOptions.map(function(opt, i) {
            var chosen = data && data.chosen === i;
            return (<button key={i} onClick={function(){setData(Object.assign({}, data, { chosen: i }));}} style={{ padding: "14px 16px", borderRadius: 12, border: chosen ? "2px solid #2a6a5a" : "2px solid #e5e7eb", background: chosen ? "linear-gradient(135deg, #f0f7f4, #e8f5e9)" : "#fafbfc", cursor: "pointer", textAlign: "left", fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: "#1f2937", transition: "all 0.2s ease", display: "flex", alignItems: "flex-start", gap: 12 }}>

            </button>);
          })}
        </div>)}

  if (step.inputType === "reflection") {

          </div>);
        })}
      </div>
    );
  }
  return null;
}

/* ───────── SUMMARY ───────── */

function Summary({ answers, scenario, onRestart, customScenarioData }) {
  var scenarioObj = SCENARIOS.find(function(s){return s.id === scenario;});
  /* For "eigenes" used directly, override with custom data */
  var displayTitle = (scenario === "eigenes" && customScenarioData && customScenarioData.title) ? customScenarioData.title : (scenarioObj && scenarioObj.title);
  var displayIcon = (scenario === "eigenes" && customScenarioData && customScenarioData.icon) ? customScenarioData.icon : (scenarioObj && scenarioObj.icon);
  var displayDesc = (scenario === "eigenes" && customScenarioData && customScenarioData.description) ? customScenarioData.description : (scenarioObj && scenarioObj.description);
  var options = (answers[4] || []).filter(function(o){return o.trim();});
  var decision = answers[6];

  var insights = generateSummaryAnalysis(answers);

  return (
    <div style={{ animation: "fadeIn 0.6s ease" }}>

        <div style={{ fontSize: 12, fontWeight: 700, color: "#2a6a5a", fontFamily: "'DM Mono', monospace", letterSpacing: "0.05em", marginBottom: 4 }}>SZENARIO</div>
        <div style={{ fontSize: 16, fontWeight: 700, color: "#1a3a4a", fontFamily: "'Fraunces', serif", marginBottom: 8 }}>{displayIcon} {displayTitle}</div>
        {displayDesc && <div style={{ fontSize: 13, lineHeight: 1.7, color: "#4b5563", fontFamily: "'DM Sans', sans-serif" }}>{displayDesc}</div>}

      {STEPS.map(function(step, i) {

        /* ── Render matrix as a real table ── */
        if (step.inputType === "matrix") {
          var matrix = val || {};
          var filledKeys = Object.keys(matrix).filter(function(k){return matrix[k] > 0;});
          if (filledKeys.length === 0) return null;
          var symbols = ["\u2014", "\u2713", "\u2717", "?"];

                <span style={{ fontSize: 20 }}>{step.icon}</span>
                <div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#2a6a5a", fontFamily: "'DM Mono', monospace", letterSpacing: "0.05em" }}>SCHRITT {step.num}</div>

                </div>
              </div>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, fontFamily: "'DM Sans', sans-serif" }}>
                  <thead>
                    <tr>
                      <th style={{ textAlign: "left", padding: "8px 10px", borderBottom: "2px solid #e5e7eb", fontWeight: 700, color: "#1a3a4a", fontSize: 11 }}>Test</th>
                      {options.map(function(opt, oi) {
                        return <th key={oi} style={{ textAlign: "center", padding: "8px 6px", borderBottom: "2px solid #e5e7eb", fontWeight: 700, color: "#1a3a4a", fontSize: 11, maxWidth: 100 }}>Opt. {String.fromCharCode(65 + oi)}</th>;

                  <tbody>

        else if (Array.isArray(val)) content = val.filter(function(v){return v.trim();}).map(function(v,j){return String.fromCharCode(65+j)+": "+v;}).join("\n");
        else if (step.inputType === "decision") content = chosenOption ? "Gewählt: Option " + String.fromCharCode(65+decision.chosen) + " - " + chosenOption + "\n\nBegründung: " + (decision.reason || "(keine)") : (decision && decision.reason) || "";
        else if (step.inputType === "reflection") { var qs = ["Prävention", "Vorsichtsmaßnahmen", "Einbeziehung anderer"]; content = qs.map(function(q,j){return val["q"+j] ? q+": "+val["q"+j] : "";}).filter(Boolean).join("\n"); }
        if (!content) return null;
        return (
          <div key={i} style={{ marginBottom: 20, padding: "16px 20px", background: "#fff", borderRadius: 14, border: "1px solid #e8eaed", boxShadow: "0 1px 4px rgba(0,0,0,0.03)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>

              </div>
            </div>
            <div style={{ fontSize: 13, lineHeight: 1.8, color: "#4b5563", fontFamily: "'DM Sans', sans-serif", whiteSpace: "pre-wrap" }}>{content}</div>
          </div>
        );
      })}

      {/* REFLEXIONS-ANALYSE */}
      {insights.length > 0 && (
        <div style={{ marginTop: 12, marginBottom: 24 }}>
          <div style={{
            display: "flex", alignItems: "center", gap: 10, marginBottom: 16, padding: "14px 20px",
            background: "linear-gradient(135deg, #2a3a5a, #3a5a6a)", borderRadius: 14
          }}>
            <span style={{ fontSize: 22 }}>{"\u{1F9E0}"}</span>
            <div>
              <div style={{ fontSize: 16, fontWeight: 800, color: "#fff", fontFamily: "'Fraunces', serif" }}>Reflexions-Analyse</div>
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.7)", fontFamily: "'DM Sans', sans-serif" }}>Was Ihr Denkprozess über sich selbst verrät</div>
            </div>
          </div>
          {insights.map(function(insight, i) { return <SummaryInsightCard key={i} insight={insight} />; })}
          <div style={{
            padding: "12px 16px", background: "#f8f9fa", borderRadius: 10,
            fontSize: 12, lineHeight: 1.6, color: "#6b7280",
            fontFamily: "'DM Sans', sans-serif", fontStyle: "italic",
            marginTop: 8
          }}>
            Hinweis: Diese Analyse bewertet nicht Ihre ethische Position, sondern spiegelt Muster in Ihrem Denkprozess wider. Es gibt hier kein 'richtig' oder 'falsch'.
          </div>
        </div>
      )}

      <div className="no-print" style={{ display: "flex", gap: 12, marginTop: 32, flexWrap: "wrap" }}>
        <button onClick={onRestart} style={{ flex: 1, padding: "14px 24px", borderRadius: 12, border: "2px solid #2a6a5a", background: "transparent", color: "#2a6a5a", fontSize: 14, fontWeight: 700, fontFamily: "'DM Sans', sans-serif", cursor: "pointer", transition: "all 0.2s ease", minWidth: 180 }}>{"\u{1F504}"} Neues Szenario starten</button>
        <button onClick={function(){window.print();}} style={{ flex: 1, padding: "14px 24px", borderRadius: 12, border: "none", background: "linear-gradient(135deg, #1a3a4a, #2a6a5a)", color: "#fff", fontSize: 14, fontWeight: 700, fontFamily: "'DM Sans', sans-serif", cursor: "pointer", transition: "all 0.2s ease", minWidth: 180 }}>{"\u{1F5A8}\uFE0F"} Ergebnis drucken</button>
      </div>
    </div>
  );
}

/* ───────── MAIN APP ───────── */

function EthikKompass() {
  var _phase = useState("intro"), phase = _phase[0], setPhase = _phase[1];
  var _scenario = useState(null), scenario = _scenario[0], setScenario = _scenario[1];
  var _step = useState(0), currentStep = _step[0], setCurrentStep = _step[1];
  var _answers = useState({}), answers = _answers[0], setAnswers = _answers[1];
  var _custom = useState(""), customScenario = _custom[0], setCustomScenario = _custom[1];
  var _customTitle = useState(""), customTitle = _customTitle[0], setCustomTitle = _customTitle[1];
  var _customShort = useState(""), customShort = _customShort[0], setCustomShort = _customShort[1];
  var _customIcon = useState("\u{1F4DD}"), customIcon = _customIcon[0], setCustomIcon = _customIcon[1];
  var _feedback = useState([]), feedback = _feedback[0], setFeedback = _feedback[1];
  var _showFb = useState(false), showFeedback = _showFb[0], setShowFeedback = _showFb[1];
  var _exportDone = useState(false), exportDone = _exportDone[0], setExportDone = _exportDone[1];
  var contentRef = useRef(null);

  var handleExportScenario = function() {
    if (!customTitle.trim() || !customScenario.trim()) return;
    var newScenario = JSON.stringify({
      id: "custom-" + Date.now(),
      title: customTitle.trim(),
      icon: customIcon,
      short: customShort.trim() || customScenario.trim().substring(0, 120) + "...",
      description: customScenario.trim()
    }, null, 2);

    /* Get the original JSX source from the script tag - Babel keeps it intact */
    var babelScript = document.querySelector('script[type="text/babel"]');
    if (!babelScript) { alert("Export fehlgeschlagen: Script-Tag nicht gefunden."); return; }
    var originalJSX = babelScript.textContent;

    /* Replace the CUSTOM_SCENARIO marker in the original source */
    var modifiedJSX = originalJSX.replace(
      /\/\* EXPORT_MARKER_START \*\/[\s\S]*?\/\* EXPORT_MARKER_END \*\//,
      "/* EXPORT_MARKER_START */\nconst CUSTOM_SCENARIO = " + newScenario + ";\n/* EXPORT_MARKER_END */"
    );

    /* Get the style block */
    var styleEl = document.querySelector("style");
    var styleContent = styleEl ? styleEl.textContent : "";

    /* Reconstruct the full HTML document from scratch */
    var html = '<!DOCTYPE html>\n<html lang="de">\n<head>\n'
      + '<meta charset="UTF-8">\n'
      + '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n'
      + '<title>Ethik-Kompass - 7 Schritte zur ethischen Entscheidungsfindung</title>\n'
      + '<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"><\/script>\n'
      + '<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"><\/script>\n'
      + '<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"><\/script>\n'
      + '<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,800&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">\n'
      + '<style>\n' + styleContent + '\n</style>\n'
      + '</head>\n<body>\n'
      + '<div id="root"></div>\n'
      + '<script type="text/babel">\n' + modifiedJSX + '\n<\/script>\n'
      + '</body>\n</html>';

    var blob = new Blob([html], { type: "text/html;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "ethik-kompass-" + customTitle.trim().toLowerCase().replace(/[^a-z0-9äöüß]+/gi, "-").replace(/-+$/, "") + ".html";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setExportDone(true);
    setTimeout(function(){ setExportDone(false); }, 4000);
  };

  useEffect(function() {
    if (contentRef.current) contentRef.current.scrollTo({ top: 0, behavior: "smooth" });
    setShowFeedback(false);
    // Generate feedback for current step
    var fb = generateStepFeedback(currentStep + 1, answers[currentStep + 1], answers);
    setFeedback(fb);
  }, [currentStep, phase]);

  // Live feedback update when data changes
  useEffect(function() {
    if (phase === "steps") {
      var fb = generateStepFeedback(currentStep + 1, answers[currentStep + 1], answers);
      setFeedback(fb);
    }
  }, [answers]);

  var setStepData = function(val) { setAnswers(function(prev) { return Object.assign({}, prev, { [currentStep + 1]: val }); }); };
  var handleStart = function() { if (!scenario) return; setPhase("steps"); setCurrentStep(0); };
  var handleRestart = function() { setPhase("intro"); setScenario(null); setCurrentStep(0); setAnswers({}); setCustomScenario(""); setCustomTitle(""); setCustomShort(""); setCustomIcon("\u{1F4DD}"); setFeedback([]); setShowFeedback(false); };

  var handleNext = function() {
    // Show feedback before advancing
    var fb = generateStepFeedback(currentStep + 1, answers[currentStep + 1], answers);
    if (fb.length > 0 && !showFeedback) {
      setFeedback(fb);
      setShowFeedback(true);
      // Scroll to feedback
      setTimeout(function() {
        if (contentRef.current) contentRef.current.scrollTo({ top: contentRef.current.scrollHeight, behavior: "smooth" });
      }, 100);
      return;
    }
    // Advance
    setShowFeedback(false);
    if (currentStep < 6) setCurrentStep(currentStep + 1);
    else setPhase("summary");
  };

  var options = answers[4] || [];

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(160deg, #f5f7f6 0%, #eaf0ed 40%, #f0f4f2 100%)", fontFamily: "'DM Sans', sans-serif", display: "flex", flexDirection: "column", alignItems: "center", padding: "20px 16px" }}>
      <div style={{ width: "100%", maxWidth: 680, background: "#fff", borderRadius: 24, boxShadow: "0 4px 40px rgba(26,58,74,0.08), 0 1px 3px rgba(0,0,0,0.04)", overflow: "hidden", display: "flex", flexDirection: "column" }}>
        <div style={{ background: "linear-gradient(135deg, #1a3a4a 0%, #2a5a4a 100%)", padding: "20px 28px", display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ width: 42, height: 42, borderRadius: 12, background: "rgba(255,255,255,0.15)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>{"\u{1F9ED}"}</div>
          <div>
            <h1 style={{ margin: 0, fontFamily: "'Fraunces', serif", fontSize: 22, fontWeight: 800, color: "#fff", letterSpacing: "-0.02em" }}>Ethik-Kompass</h1>
            <p style={{ margin: 0, fontSize: 12, color: "rgba(255,255,255,0.7)", fontFamily: "'DM Mono', monospace" }}>7 Schritte zur ethischen Entscheidungsfindung</p>
          </div>
        </div>

        <div ref={contentRef} style={{ flex: 1, padding: "28px 28px 24px", overflowY: "auto" }}>
          {phase === "intro" && (
            <div style={{ animation: "fadeIn 0.5s ease" }}>
              <h2 style={{ fontFamily: "'Fraunces', serif", fontSize: 22, fontWeight: 800, color: "#1a3a4a", margin: "0 0 8px 0" }}>Wählen Sie ein Szenario</h2>
              <p style={{ fontSize: 14, color: "#6b7280", lineHeight: 1.7, marginBottom: 24, marginTop: 0 }}>Untersuchen Sie ein ethisches Dilemma aus der KI-Welt - oder bringen Sie Ihr eigenes mit.</p>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 12, marginBottom: 24 }}>

              </div>
              {scenario === "eigenes" && (
                <div style={{ marginBottom: 20, animation: "fadeIn 0.3s ease" }}>
                  <div style={{ background: "#f8f9fa", borderRadius: 14, padding: "20px", border: "1px solid #e8eaed", marginBottom: 16 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "#2a6a5a", fontFamily: "'DM Mono', monospace", letterSpacing: "0.05em", marginBottom: 14 }}>EIGENES SZENARIO ERSTELLEN</div>

                    <div style={{ display: "flex", gap: 12, marginBottom: 12 }}>

                          style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: "2px solid #e5e7eb", fontSize: 14, fontFamily: "'DM Sans', sans-serif", background: "#fff", boxSizing: "border-box", color: "#1f2937" }}
                          onFocus={function(e){e.target.style.borderColor="#2a6a5a";}} onBlur={function(e){e.target.style.borderColor="#e5e7eb";}} />
                      </div>
                      <div style={{ width: 80 }}>
                        <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#1a3a4a", marginBottom: 4 }}>Icon</label>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                          {["\u{1F4DD}", "\u{1F916}", "\u{1F3EB}", "\u{1F50D}", "\u{1F4F1}", "\u{1F3E5}", "\u{1F4BC}", "\u{1F30D}", "\u{1F6E1}\uFE0F", "\u2696\uFE0F", "\u{1F9E0}", "\u{1F4F7}"].map(function(em) {
                            return <button key={em} onClick={function(){setCustomIcon(em);}} style={{
                              width: 30, height: 30, borderRadius: 6, border: customIcon === em ? "2px solid #2a6a5a" : "1px solid #e5e7eb",
                              background: customIcon === em ? "#f0f7f4" : "#fff", cursor: "pointer", fontSize: 15,
                              display: "flex", alignItems: "center", justifyContent: "center", padding: 0
                            }}>{em}</button>;
                          })}
                        </div>
                      </div>
                    </div>

                    <div style={{ marginBottom: 12 }}>
                      <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#1a3a4a", marginBottom: 4 }}>Kurzbeschreibung <span style={{ fontWeight: 400, color: "#9ca3af" }}>(für die Kachel)</span></label>
                      <input value={customShort} onChange={function(e){setCustomShort(e.target.value);}}
                        placeholder="Ein Satz, der das Dilemma zusammenfasst..." type="text"
                        style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: "2px solid #e5e7eb", fontSize: 13, fontFamily: "'DM Sans', sans-serif", background: "#fff", boxSizing: "border-box", color: "#1f2937" }}
                        onFocus={function(e){e.target.style.borderColor="#2a6a5a";}} onBlur={function(e){e.target.style.borderColor="#e5e7eb";}} />
                    </div>

                    <div style={{ marginBottom: 16 }}>
                      <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#1a3a4a", marginBottom: 4 }}>Vollständige Szenario-Beschreibung</label>
                      <textarea value={customScenario} onChange={function(e){setCustomScenario(e.target.value);}}
                        placeholder="Beschreiben Sie die Situation ausführlich: Was ist passiert? Wer ist beteiligt? Was macht das Szenario ethisch problematisch?" rows={5}
                        style={{ width: "100%", padding: 12, borderRadius: 10, border: "2px solid #e5e7eb", fontSize: 13, fontFamily: "'DM Sans', sans-serif", lineHeight: 1.7, resize: "vertical", background: "#fff", boxSizing: "border-box", color: "#1f2937" }}
                        onFocus={function(e){e.target.style.borderColor="#2a6a5a";}} onBlur={function(e){e.target.style.borderColor="#e5e7eb";}} />
                    </div>

                    {/* Export Button */}
                    <button onClick={handleExportScenario} disabled={!customTitle.trim() || !customScenario.trim()} style={{
                      width: "100%", padding: "13px 20px", borderRadius: 12, border: "2px dashed " + (customTitle.trim() && customScenario.trim() ? "#2a6a5a" : "#d1d5db"),
                      background: customTitle.trim() && customScenario.trim() ? "linear-gradient(135deg, #f0f7f4, #e8f5e9)" : "#f8f9fa",
                      color: customTitle.trim() && customScenario.trim() ? "#1a3a4a" : "#9ca3af",
                      fontSize: 13, fontWeight: 700, fontFamily: "'DM Sans', sans-serif",
                      cursor: customTitle.trim() && customScenario.trim() ? "pointer" : "not-allowed",
                      transition: "all 0.2s ease", display: "flex", alignItems: "center", justifyContent: "center", gap: 8
                    }}>
                      {exportDone ? <span>{"\u2713"} HTML-Datei wurde heruntergeladen!</span> : <span>{"\u{1F4E5}"} Als HTML-Datei für Schüler exportieren</span>}
                    </button>
                    <div style={{ fontSize: 11, color: "#9ca3af", marginTop: 6, lineHeight: 1.5, fontFamily: "'DM Sans', sans-serif" }}>
                      Erzeugt eine neue HTML-Datei, in der Ihr Szenario als eigene Kachel neben den drei vorhandenen erscheint. Diese Datei können Sie direkt an Schüler weitergeben.
                    </div>
                  </div>
                </div>
              )}
              <button onClick={handleStart} disabled={!scenario || (scenario === "eigenes" && !customScenario.trim())} style={{ width: "100%", padding: "15px 24px", borderRadius: 14, border: "none", background: (scenario && (scenario !== "eigenes" || customScenario.trim())) ? "linear-gradient(135deg, #1a3a4a, #2a6a5a)" : "#e5e7eb", color: (scenario && (scenario !== "eigenes" || customScenario.trim())) ? "#fff" : "#9ca3af", fontSize: 15, fontWeight: 700, fontFamily: "'DM Sans', sans-serif", cursor: (scenario && (scenario !== "eigenes" || customScenario.trim())) ? "pointer" : "not-allowed", transition: "all 0.3s ease" }}>{scenario === "eigenes" ? "Eigenes Szenario direkt analysieren \u2192" : "Analyse starten \u2192"}</button>
            </div>
          )}

          {phase === "steps" && (
            <div style={{ animation: "fadeIn 0.4s ease" }}>
              <ProgressBar currentStep={currentStep} totalSteps={7} />
              {(scenario !== "eigenes" || customScenario.trim()) && (
                <details style={{ background: "#f8f9fa", borderRadius: 12, marginBottom: 20, border: "1px solid #e8eaed", overflow: "hidden" }}>
                  <summary style={{ padding: "10px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600, color: "#6b7280", fontFamily: "'DM Mono', monospace", letterSpacing: "0.04em", display: "flex", alignItems: "center", gap: 8, userSelect: "none" }}>
                    <span>{scenario === "eigenes" ? customIcon : (SCENARIOS.find(function(s){return s.id===scenario;}) || {}).icon}</span>
                    SZENARIO: {scenario === "eigenes" ? (customTitle || "Eigenes Szenario") : (SCENARIOS.find(function(s){return s.id===scenario;}) || {}).title}
                    <span style={{ fontSize: 10, color: "#9ca3af", marginLeft: "auto" }}>(klicken zum Anzeigen)</span>
                  </summary>
                  <div style={{ padding: "0 16px 12px", borderTop: "1px solid #e8eaed", paddingTop: 10 }}>
                    <div style={{ fontSize: 13, lineHeight: 1.7, color: "#4b5563", marginBottom: 12 }}>
                      {scenario === "eigenes" ? customScenario : (SCENARIOS.find(function(s){return s.id===scenario;}) || {}).description}
                    </div>
                    {(function() {
                      var sc = SCENARIOS.find(function(s){return s.id===scenario;});
                      if (!sc || !sc.sources) return null;
                      return (
                        <div style={{ borderTop: "1px solid #e8eaed", paddingTop: 10 }}>
                          <div style={{ fontSize: 11, fontWeight: 700, color: "#2a6a5a", fontFamily: "'DM Mono', monospace", letterSpacing: "0.04em", marginBottom: 6 }}>QUELLEN & HINTERGRÜNDE</div>
                          {sc.sources.map(function(src, i) {
                            return (
                              <a key={i} href={src.url} target="_blank" rel="noopener noreferrer" style={{
                                display: "block", padding: "8px 10px", marginBottom: 4,
                                borderRadius: 8, background: "#fff", border: "1px solid #e0e7e4",
                                textDecoration: "none", color: "#1a3a4a", fontSize: 12,
                                lineHeight: 1.5, transition: "all 0.2s ease"
                              }}>
                                <div style={{ fontWeight: 600, marginBottom: 2 }}>{src.title} {"\u2197"}</div>
                                <div style={{ color: "#6b7280", fontSize: 11 }}>{src.desc}</div>
                              </a>
                            );
                          })}
                        </div>
                      );
                    })()}
                  </div>
                </details>
              )}
              <div style={{ display: "flex", alignItems: "flex-start", gap: 14, marginBottom: 20 }}>
                <div style={{ width: 48, height: 48, borderRadius: 14, background: "linear-gradient(135deg, #f0f7f4, #e0efe8)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, flexShrink: 0 }}>{STEPS[currentStep].icon}</div>
                <div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#2a6a5a", fontFamily: "'DM Mono', monospace", letterSpacing: "0.05em", marginBottom: 2 }}>SCHRITT {STEPS[currentStep].num} VON 7</div>
                  <h3 style={{ margin: "0 0 2px 0", fontFamily: "'Fraunces', serif", fontSize: 20, fontWeight: 800, color: "#1a3a4a" }}>{STEPS[currentStep].title}</h3>
                  <p style={{ margin: 0, fontSize: 13, color: "#6b7280" }}>{STEPS[currentStep].subtitle}</p>
                </div>
              </div>
              <StepContent step={STEPS[currentStep]} data={answers[currentStep + 1]} setData={setStepData} scenario={scenario} options={options} />

              {/* STEP FEEDBACK */}
              {showFeedback && feedback.length > 0 && <FeedbackPanel items={feedback} animate={true} />}

              <div className="no-print" style={{ display: "flex", justifyContent: "space-between", marginTop: 28, gap: 12 }}>
                <button onClick={function(){ setShowFeedback(false); currentStep === 0 ? setPhase("intro") : setCurrentStep(currentStep - 1); }} style={{ padding: "12px 22px", borderRadius: 12, border: "2px solid #e5e7eb", background: "#fff", color: "#4b5563", fontSize: 14, fontWeight: 600, fontFamily: "'DM Sans', sans-serif", cursor: "pointer", transition: "all 0.2s ease" }}>{"\u2190"} Zurück</button>
                <button onClick={handleNext} style={{
                  padding: "12px 28px", borderRadius: 12, border: "none",
                  background: showFeedback ? "linear-gradient(135deg, #2a5a6a, #3a7a6a)" : "linear-gradient(135deg, #1a3a4a, #2a6a5a)",
                  color: "#fff", fontSize: 14, fontWeight: 700,
                  fontFamily: "'DM Sans', sans-serif", cursor: "pointer", transition: "all 0.2s ease"
                }}>{showFeedback ? "Verstanden, weiter \u2192" : (currentStep < 6 ? "Weiter \u2192" : "Zusammenfassung \u2192")}</button>
              </div>
            </div>
          )}

          {phase === "summary" && <Summary answers={answers} scenario={scenario} onRestart={handleRestart} customScenarioData={{ title: customTitle, description: customScenario, icon: customIcon }} />}
        </div>
      </div>
      <div style={{ marginTop: 16, fontSize: 11, color: "#9ca3af", fontFamily: "'DM Mono', monospace", textAlign: "center" }}>
        Basierend auf dem 7-Schritte-Leitfaden für ethische Entscheidungsfindung {"\u00B7"} Modul 16
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(EthikKompass), document.getElementById("root"));
</script>
</body>
</html>
