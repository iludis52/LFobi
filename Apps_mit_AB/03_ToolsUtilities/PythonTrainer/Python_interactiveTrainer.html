<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Syntax Trainer</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Prism.js for syntax highlighting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    
    <style>
        /* Custom styles for the app */
        body {
            font-family: 'Inter', sans-serif;
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
        
        /* Custom styles for the contenteditable code editor */
        .code-editor {
            background-color: #2d2d2d;
            border-radius: 0.5rem;
            padding: 1rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            min-height: 50px;
            outline: none;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .code-editor:focus {
            border-color: #4f46e5;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-3xl bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 md:p-8">
        
        <header class="text-center mb-6">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white">Python Syntax Trainer</h1>
            <p class="text-gray-600 dark:text-gray-400 mt-2">Wähle die Bibliotheken und starte das Quiz!</p>
        </header>

        <!-- Setup Screen -->
        <div id="setup-screen">
            <fieldset class="mb-6">
                <legend class="text-lg font-semibold mb-3 text-gray-900 dark:text-white">Themen auswählen:</legend>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="flex items-center ps-4 border border-gray-200 dark:border-gray-700 rounded-lg">
                        <input checked id="numpy-checkbox" type="checkbox" value="numpy" name="library" class="w-4 h-4 text-indigo-600 bg-gray-100 border-gray-300 rounded focus:ring-indigo-500 dark:focus:ring-indigo-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                        <label for="numpy-checkbox" class="w-full py-4 ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">NumPy</label>
                    </div>
                    <div class="flex items-center ps-4 border border-gray-200 dark:border-gray-700 rounded-lg">
                        <input checked id="pandas-checkbox" type="checkbox" value="pandas" name="library" class="w-4 h-4 text-indigo-600 bg-gray-100 border-gray-300 rounded focus:ring-indigo-500 dark:focus:ring-indigo-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                        <label for="pandas-checkbox" class="w-full py-4 ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">Pandas</label>
                    </div>
                    <div class="flex items-center ps-4 border border-gray-200 dark:border-gray-700 rounded-lg">
                        <input checked id="matplotlib-checkbox" type="checkbox" value="matplotlib" name="library" class="w-4 h-4 text-indigo-600 bg-gray-100 border-gray-300 rounded focus:ring-indigo-500 dark:focus:ring-indigo-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                        <label for="matplotlib-checkbox" class="w-full py-4 ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">Matplotlib</label>
                    </div>
                </div>
            </fieldset>
            <div class="flex justify-center">
                <button id="start-quiz-btn" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-lg transition-transform transform hover:scale-105 shadow-md">
                    Quiz starten (10 Fragen)
                </button>
            </div>
        </div>

        <!-- Quiz Screen (hidden by default) -->
        <div id="quiz-screen" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-900 dark:text-white">Frage <span id="question-count">1</span>/10</h2>
                <div class="text-lg font-semibold bg-indigo-100 dark:bg-indigo-900 text-indigo-800 dark:text-indigo-200 px-4 py-1 rounded-full">
                    Punkte: <span id="score">0</span>
                </div>
            </div>

            <div class="bg-gray-50 dark:bg-gray-700 p-6 rounded-lg mb-4">
                <p id="question-text" class="text-lg text-gray-800 dark:text-gray-200 leading-relaxed"></p>
            </div>

            <div class="mb-4">
                <label for="user-input" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Deine Antwort:</label>
                <div id="user-input-container" class="relative">
                    <pre class="rounded-lg"><code id="user-input" class="language-python code-editor" contenteditable="true" spellcheck="false"></code></pre>
                </div>
            </div>
            
            <div id="feedback" class="p-4 rounded-lg mb-4 text-center font-medium hidden"></div>

            <div class="flex justify-center space-x-4">
                <button id="submit-btn" class="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg transition-transform transform hover:scale-105 shadow-md">Absenden</button>
                <button id="next-btn" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition-transform transform hover:scale-105 shadow-md hidden">Weiter</button>
                <button id="end-quiz-btn" class="w-full sm:w-auto bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 px-8 rounded-lg transition-transform transform hover:scale-105 shadow-md">Quiz beenden</button>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- DOM Elements ---
        const setupScreen = document.getElementById('setup-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const startQuizBtn = document.getElementById('start-quiz-btn');
        const endQuizBtn = document.getElementById('end-quiz-btn');
        
        const questionCountEl = document.getElementById('question-count');
        const scoreEl = document.getElementById('score');
        const questionTextEl = document.getElementById('question-text');
        const userInputEl = document.getElementById('user-input');
        const feedbackEl = document.getElementById('feedback');
        const submitBtn = document.getElementById('submit-btn');
        const nextBtn = document.getElementById('next-btn');

        // --- Helper Functions ---
        const getRandomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const getRandomElement = (arr) => arr[Math.floor(Math.random() * arr.length)];
        
        const VAR_NAMES = ['data', 'arr', 'my_array', 'df', 'series', 'result'];
        const FILE_NAMES = ['sales.csv', 'data.csv', 'customers.csv', 'records.csv'];
        const COLUMN_NAMES = ['id', 'user', 'value', 'category', 'product', 'revenue'];
        const AXIS_LABELS = ['Länge', 'Höhe', 'Temperatur', 'Zeit', 'Druck', 'Geschwindigkeit'];
        
        // --- Question Pool ---
        // Modular structure for easily adding new questions.
        // Each question object has a `library` and a `generate` function.
        // The `generate` function creates a unique question instance with:
        // - `questionText`: The task description for the user.
        // - `correctAnswer`: An example of a correct answer for feedback.
        // - `validator`: A regex to validate the user's input flexibly.
        const questionPool = [
            {
                library: 'numpy',
                generate: () => {
                    const rows = getRandomInt(2, 10);
                    const cols = getRandomInt(2, 10);
                    const varName = getRandomElement(VAR_NAMES);
                    const questionText = `Erzeuge ein NumPy-Array namens <code>${varName}</code>, das mit Nullen gefüllt ist und die Form (shape) <code>(${rows}, ${cols})</code> hat.`;
                    const correctAnswer = `${varName} = np.zeros((${rows}, ${cols}))`;
                    const validator = new RegExp(`^${varName}\\s*=\\s*np\\.zeros\\(\\s*\\(\\s*${rows}\\s*,\\s*${cols}\\s*\\)\\s*\\)$`);
                    return { questionText, correctAnswer, validator };
                }
            },
            {
                library: 'numpy',
                generate: () => {
                    const varName = 'arr';
                    const newVarName = 'reshaped_arr';
                    const r1 = getRandomInt(2, 4);
                    const c1 = getRandomInt(4, 6);
                    const total = r1 * c1;
                    // Find new dimensions
                    let r2, c2;
                    do {
                        r2 = getRandomInt(2, total-1);
                    } while (total % r2 !== 0);
                    c2 = total / r2;

                    const questionText = `Ein existierendes NumPy-Array <code>${varName}</code> (mit ${total} Elementen) soll in eine neue Form <code>(${r2}, ${c2})</code> gebracht und in <code>${newVarName}</code> gespeichert werden. Zeige beide möglichen Syntax-Varianten (Methode und Funktion).`;
                    const correctAnswer = `${newVarName} = ${varName}.reshape(${r2}, ${c2})  # oder np.reshape(...)`;
                    const validator = new RegExp(`^${newVarName}\\s*=\\s*(?:${varName}\\.reshape\\(\\s*${r2}\\s*,\\s*${c2}\\s*\\)|np\\.reshape\\(\\s*${varName}\\s*,\\s*\\(\\s*${r2}\\s*,\\s*${c2}\\s*\\)\\s*\\))\\s*$`);
                    return { questionText, correctAnswer, validator };
                }
            },
            {
                library: 'numpy',
                generate: () => {
                    const varName = getRandomElement(VAR_NAMES.filter(v => v !== 'result'));
                    const questionText = `Berechne den Mittelwert aller Elemente im NumPy-Array <code>${varName}</code> und speichere das Ergebnis in der Variable <code>result</code>.`;
                    const correctAnswer = `result = ${varName}.mean() # oder np.mean(${varName})`;
                    const validator = new RegExp(`^result\\s*=\\s*(?:${varName}\\.mean\\(\\s*\\)|np\\.mean\\(\\s*${varName}\\s*\\))\\s*$`);
                    return { questionText, correctAnswer, validator };
                }
            },
            {
                library: 'pandas',
                generate: () => {
                    const filename = getRandomElement(FILE_NAMES);
                    const sep = getRandomElement([';', ',']);
                    const indexCol = getRandomElement(COLUMN_NAMES);
                    const varName = 'df';
                    const questionText = `Lese die CSV-Datei <code>"${filename}"</code> in einen Pandas DataFrame namens <code>${varName}</code> ein. Die Spalten sind durch ein <code>${sep}</code> getrennt und die Spalte <code>"${indexCol}"</code> soll als Index verwendet werden.`;
                    const correctAnswer = `${varName} = pd.read_csv("${filename}", sep="${sep}", index_col="${indexCol}")`;
                    // Using lookaheads to allow any order of arguments
                    const validator = new RegExp(`^${varName}\\s*=\\s*pd\\.read_csv\\(` +
                        `(?=.*["']${filename}["'])` +
                        `(?=.*sep\\s*=\\s*["']${sep}["'])` +
                        `(?=.*index_col\\s*=\\s*["']${indexCol}["'])` +
                        `.*\\)$`
                    );
                    return { questionText, correctAnswer, validator };
                }
            },
            {
                library: 'pandas',
                generate: () => {
                    const varName = 'df';
                    const groupCol = getRandomElement(COLUMN_NAMES);
                    const aggCol = getRandomElement(COLUMN_NAMES.filter(c => c !== groupCol));
                    const resultVar = 'grouped_mean';
                    const questionText = `Gruppiere den DataFrame <code>${varName}</code> nach der Spalte <code>"${groupCol}"</code> und berechne dann den Mittelwert der Spalte <code>"${aggCol}"</code>. Speichere das Ergebnis in <code>${resultVar}</code>.`;
                    const correctAnswer = `${resultVar} = ${varName}.groupby('${groupCol}')['${aggCol}'].mean()`;
                    // This regex is quite specific to handle the chain of commands.
                    const validator = new RegExp(`^${resultVar}\\s*=\\s*${varName}\\.groupby\\(\\s*['"]${groupCol}['"]\\s*\\)\\s*\\[\\s*['"]${aggCol}['"]\\s*\\]\\.mean\\(\\s*\\)\\s*$`);
                    return { questionText, correctAnswer, validator };
                }
            },
             {
                library: 'pandas',
                generate: () => {
                    const varName = 'df';
                    const n = getRandomInt(3, 10);
                    const resultVar = 'first_rows';
                    const questionText = `Zeige die ersten <code>${n}</code> Zeilen des DataFrames <code>${varName}</code> an und speichere sie in der Variable <code>${resultVar}</code>.`;
                    const correctAnswer = `${resultVar} = ${varName}.head(${n})`;
                    const validator = new RegExp(`^${resultVar}\\s*=\\s*${varName}\\.head\\(\\s*${n}?\\s*\\)$`);
                    return { questionText, correctAnswer, validator };
                }
            },
            {
                library: 'matplotlib',
                generate: () => {
                    const title = `Plot der ${getRandomElement(AXIS_LABELS)}`;
                    const questionText = `Setze den Titel eines Matplotlib-Plots auf: <code>"${title}"</code>.`;
                    const correctAnswer = `plt.title("${title}")`;
                    const validator = new RegExp(`^plt\\.title\\(\\s*["']${title}["']\\s*\\)$`);
                    return { questionText, correctAnswer, validator };
                }
            },
            {
                library: 'matplotlib',
                generate: () => {
                    const xLabel = getRandomElement(AXIS_LABELS);
                    const yLabel = getRandomElement(AXIS_LABELS.filter(l => l !== xLabel));
                    const questionText = `Erstelle ein Streudiagramm (scatter plot) mit den Daten aus <code>x_values</code> und <code>y_values</code>. Setze die x-Achsenbeschriftung auf <code>"${xLabel}"</code> und die y-Achsenbeschriftung auf <code>"${yLabel}"</code>. Fasse die Befehle mit Semikolon zusammen.`;
                    const correctAnswer = `plt.scatter(x_values, y_values); plt.xlabel("${xLabel}"); plt.ylabel("${yLabel}")`;
                    const validator = new RegExp(`^plt\\.scatter\\(\\s*x_values\\s*,\\s*y_values\\s*\\)\\s*;\\s*`+
                        `plt\\.xlabel\\(\\s*["']${xLabel}["']\\s*\\)\\s*;\\s*`+
                        `plt\\.ylabel\\(\\s*["']${yLabel}["']\\s*\\)$`
                    );
                    return { questionText, correctAnswer, validator };
                }
            },
            {
                library: 'matplotlib',
                generate: () => {
                    const questionText = `Aktiviere das Gitternetz (grid) für einen Matplotlib-Plot und zeige den Plot anschließend an.`;
                    const correctAnswer = `plt.grid(True); plt.show()`;
                    const validator = new RegExp(`^plt\\.grid\\(\\s*(?:True)?\\s*\\)\\s*;\\s*plt\\.show\\(\\s*\\)$`);
                    return { questionText, correctAnswer, validator };
                }
            }
        ];

        // --- Quiz State ---
        let quizState = {
            questions: [],
            currentQuestionIndex: 0,
            score: 0,
            totalQuestions: 10,
            currentGeneratedQuestion: null,
        };

        // --- Event Listeners ---
        startQuizBtn.addEventListener('click', startQuiz);
        submitBtn.addEventListener('click', checkAnswer);
        nextBtn.addEventListener('click', displayNextQuestion);
        endQuizBtn.addEventListener('click', endQuiz);
        userInputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!submitBtn.classList.contains('hidden')) {
                    checkAnswer();
                }
            }
        });
        
        // --- Quiz Logic Functions ---
        function startQuiz() {
            const selectedLibs = Array.from(document.querySelectorAll('input[name="library"]:checked')).map(cb => cb.value);
            
            if (selectedLibs.length === 0) {
                alert('Bitte wähle mindestens ein Thema aus!');
                return;
            }

            const availableQuestions = questionPool.filter(q => selectedLibs.includes(q.library));
            
            // Shuffle and pick N questions
            quizState.questions = availableQuestions.sort(() => 0.5 - Math.random()).slice(0, quizState.totalQuestions);
            quizState.currentQuestionIndex = 0;
            quizState.score = 0;

            setupScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');

            updateScore();
            displayNextQuestion();
        }

        function displayNextQuestion() {
            if (quizState.currentQuestionIndex >= quizState.totalQuestions) {
                showFinalScore();
                return;
            }

            const questionTemplate = quizState.questions[quizState.currentQuestionIndex];
            quizState.currentGeneratedQuestion = questionTemplate.generate();

            questionCountEl.textContent = quizState.currentQuestionIndex + 1;
            questionTextEl.innerHTML = quizState.currentGeneratedQuestion.questionText;
            
            userInputEl.textContent = '';
            feedbackEl.classList.add('hidden');
            submitBtn.classList.remove('hidden');
            nextBtn.classList.add('hidden');
        }

        function checkAnswer() {
            const userAnswer = userInputEl.textContent.trim();
            const { validator, correctAnswer } = quizState.currentGeneratedQuestion;

            // Normalize answer by removing extra spaces, but not inside quotes
            const simplifiedAnswer = userAnswer.replace(/\s+/g, ' ').replace(/\s*([,=\(\)\[\];])\s*/g, '$1');

            if (validator.test(simplifiedAnswer)) {
                quizState.score++;
                feedbackEl.innerHTML = '<strong>Korrekt!</strong> 🎉';
                feedbackEl.className = 'p-4 rounded-lg mb-4 text-center font-medium bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-200';
            } else {
                feedbackEl.innerHTML = `<strong>Nicht ganz...</strong> Eine mögliche Lösung ist: <br><pre class="inline-block mt-2 text-left !bg-transparent !p-0"><code class="language-python !text-current">${correctAnswer}</code></pre>`;
                feedbackEl.className = 'p-4 rounded-lg mb-4 text-center font-medium bg-red-100 dark:bg-red-900 text-red-800 dark:text-red-200';
                Prism.highlightAll(); // Re-highlight for the answer
            }

            updateScore();
            feedbackEl.classList.remove('hidden');
            submitBtn.classList.add('hidden');
            nextBtn.classList.remove('hidden');
            
            quizState.currentQuestionIndex++;
        }

        function updateScore() {
            scoreEl.textContent = quizState.score;
        }

        function showFinalScore() {
            questionTextEl.innerHTML = `Quiz beendet! Du hast <strong>${quizState.score} von ${quizState.totalQuestions}</strong> Fragen richtig beantwortet.`;
            userInputEl.contentEditable = false;
            userInputEl.textContent = '';
            feedbackEl.classList.add('hidden');
            submitBtn.classList.add('hidden');
            nextBtn.classList.add('hidden');
        }

        function endQuiz() {
            quizScreen.classList.add('hidden');
            setupScreen.classList.remove('hidden');
            userInputEl.contentEditable = true;
        }
    });
    </script>
</body>
</html>
